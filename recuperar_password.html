<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar Contraseña - Sistema Educativo</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/recuperar.css" />
  <!-- Script oficial de Google reCAPTCHA -->
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body>
  <main class="recover-container">
    <div class="info-box">
      <p><strong>Si olvidaste tu contraseña</strong><br>
      Por favor completa los siguientes pasos</p>
    </div>

    <form class="recover-box" action="procesar_recuperacion.php" method="POST">
      <h2>Cambiar contraseña de cuenta</h2>

      <div class="input-group">
        <label for="dni">DNI</label>
        <input type="text" id="dni" name="dni" placeholder="Ingrese su DNI" required>
      </div>

      <!-- CAPTCHA real -->
      <div class="captcha-box">
        <div class="g-recaptcha" data-sitekey="TU_SITE_KEY_AQUI"></div>
      </div>

      <button type="submit">Aceptar</button>

      <div class="footer-text">
        <hr>
        <p>Por favor revisar su email para obtener su nueva contraseña</p>
      </div>
    </form>
  </main>
</body>
</html>
